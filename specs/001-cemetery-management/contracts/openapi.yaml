openapi: 3.1.0
info:
  title: Jaziggo Internal API
  version: 1.0.0
  description: >-
    Internal administrative contract. Except for login and infrastructure liveness, every operation
    requires an authenticated active ADMIN or EMPLOYEE session. This API is not public.
servers:
  - url: /api/v1
security:
  - cookieAuth: []
tags:
  - name: Auth
  - name: Users
  - name: Deceased
  - name: BurialSpaces
  - name: Responsibles
  - name: BurialLinks
  - name: LocationSearch
  - name: Reports
  - name: Operations
paths:
  /auth/login:
    post:
      tags: [Auth]
      operationId: login
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginInput'
      responses:
        '200':
          $ref: '#/components/responses/AuthSessionResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/ValidationError'
  /auth/logout:
    post:
      tags: [Auth]
      operationId: logout
      x-roles: [ADMIN, EMPLOYEE]
      responses:
        '200':
          description: Session cookie invalidated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AcknowledgementSuccessEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /auth/change-password:
    post:
      tags: [Auth]
      operationId: changeOwnPassword
      x-roles: [ADMIN, EMPLOYEE]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChangePasswordInput'
      responses:
        '200':
          $ref: '#/components/responses/AuthSessionResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/ValidationError'
  /auth/me:
    get:
      tags: [Auth]
      operationId: getCurrentUser
      x-roles: [ADMIN, EMPLOYEE]
      responses:
        '200':
          description: Current active user.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserSuccessEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /users:
    get:
      tags: [Users]
      operationId: listUsers
      x-roles: [ADMIN]
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - in: query
          name: status
          schema:
            $ref: '#/components/schemas/UserStatus'
        - in: query
          name: role
          schema:
            $ref: '#/components/schemas/UserRole'
      responses:
        '200':
          description: Paginated users.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserPageSuccessEnvelope'
        '403':
          $ref: '#/components/responses/Forbidden'
    post:
      tags: [Users]
      operationId: createUser
      x-roles: [ADMIN]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateUserInput'
      responses:
        '201':
          description: User created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserSuccessEnvelope'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/ValidationError'
  /users/{id}:
    parameters:
      - $ref: '#/components/parameters/Id'
    get:
      tags: [Users]
      operationId: getUser
      x-roles: [ADMIN]
      responses:
        '200':
          description: User detail.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserSuccessEnvelope'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      tags: [Users]
      operationId: updateUser
      x-roles: [ADMIN]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateUserInput'
      responses:
        '200':
          description: User updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserSuccessEnvelope'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/ValidationError'
  /users/{id}/reset-password:
    parameters:
      - $ref: '#/components/parameters/Id'
    patch:
      tags: [Users]
      operationId: resetUserPassword
      x-roles: [ADMIN]
      responses:
        '200':
          description: User password reset to the default first-access password and password change is required on next login.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AcknowledgementSuccessEnvelope'
        '404':
          $ref: '#/components/responses/NotFound'
  /users/{id}/deactivate:
    parameters:
      - $ref: '#/components/parameters/Id'
    patch:
      tags: [Users]
      operationId: deactivateUser
      x-roles: [ADMIN]
      responses:
        '200':
          description: User deactivated; existing session is rejected on its next operation.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AcknowledgementSuccessEnvelope'
        '404':
          $ref: '#/components/responses/NotFound'
  /deceased:
    get:
      tags: [Deceased]
      operationId: searchDeceased
      x-roles: [ADMIN, EMPLOYEE]
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - in: query
          name: name
          schema: { type: string }
        - in: query
          name: deathDate
          schema: { type: string, format: date }
        - in: query
          name: burialDate
          schema: { type: string, format: date }
        - in: query
          name: burialSpaceId
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Paginated results with masked documents only.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeceasedPageSuccessEnvelope'
    post:
      tags: [Deceased]
      operationId: createDeceased
      x-roles: [ADMIN, EMPLOYEE]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateDeceasedInput'
      responses:
        '201':
          description: Deceased record created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeceasedDetailSuccessEnvelope'
        '422':
          $ref: '#/components/responses/ValidationError'
  /deceased/search-by-document:
    post:
      tags: [Deceased]
      operationId: searchDeceasedByDocument
      x-roles: [ADMIN, EMPLOYEE]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ExactDocumentSearchInput'
      responses:
        '200':
          description: Exact document matches with masked documents only.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeceasedPageSuccessEnvelope'
        '422':
          $ref: '#/components/responses/ValidationError'
  /deceased/check-duplicates:
    post:
      tags: [Deceased]
      operationId: checkDeceasedDuplicates
      x-roles: [ADMIN, EMPLOYEE]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateDeceasedInput'
      responses:
        '200':
          description: Candidate records; documents are masked.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeceasedPageSuccessEnvelope'
  /deceased/{id}:
    parameters:
      - $ref: '#/components/parameters/Id'
    get:
      tags: [Deceased]
      operationId: getDeceased
      x-roles: [ADMIN, EMPLOYEE]
      responses:
        '200':
          description: Detail with masked document and historical links.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeceasedDetailSuccessEnvelope'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      tags: [Deceased]
      operationId: updateDeceased
      x-roles: [ADMIN, EMPLOYEE]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateDeceasedInput'
      responses:
        '200':
          description: Deceased record updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeceasedDetailSuccessEnvelope'
        '422':
          $ref: '#/components/responses/ValidationError'
  /burial-spaces:
    get:
      tags: [BurialSpaces]
      operationId: listBurialSpaces
      x-roles: [ADMIN, EMPLOYEE]
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - in: query
          name: status
          schema:
            $ref: '#/components/schemas/BurialSpaceStatus'
        - in: query
          name: type
          schema:
            $ref: '#/components/schemas/BurialSpaceType'
        - in: query
          name: sector
          schema: { type: string }
        - in: query
          name: identifier
          schema: { type: string }
      responses:
        '200':
          description: Paginated burial spaces.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BurialSpacePageSuccessEnvelope'
    post:
      tags: [BurialSpaces]
      operationId: createBurialSpace
      x-roles: [ADMIN, EMPLOYEE]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateBurialSpaceInput'
      responses:
        '201':
          description: Burial space created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BurialSpaceSuccessEnvelope'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/ValidationError'
  /burial-spaces/{id}:
    parameters:
      - $ref: '#/components/parameters/Id'
    get:
      tags: [BurialSpaces]
      operationId: getBurialSpace
      x-roles: [ADMIN, EMPLOYEE]
      responses:
        '200':
          description: Space detail including active and ended links.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BurialSpaceSuccessEnvelope'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      tags: [BurialSpaces]
      operationId: updateBurialSpace
      x-roles: [ADMIN, EMPLOYEE]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateBurialSpaceInput'
      responses:
        '200':
          description: Burial space updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BurialSpaceSuccessEnvelope'
        '409':
          $ref: '#/components/responses/Conflict'
  /burial-spaces/{id}/status:
    parameters:
      - $ref: '#/components/parameters/Id'
    patch:
      tags: [BurialSpaces]
      operationId: updateBurialSpaceStatus
      x-roles: [ADMIN, EMPLOYEE]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [status, confirmation]
              properties:
                status:
                  $ref: '#/components/schemas/BurialSpaceStatus'
                confirmation: { type: boolean, const: true }
      responses:
        '200':
          description: Status updated after active-link validation.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BurialSpaceSuccessEnvelope'
        '409':
          $ref: '#/components/responses/Conflict'
  /burial-spaces/{id}/deceased:
    parameters:
      - $ref: '#/components/parameters/Id'
    get:
      tags: [BurialSpaces]
      operationId: listDeceasedBySpace
      x-roles: [ADMIN, EMPLOYEE]
      parameters:
        - in: query
          name: linkStatus
          schema:
            $ref: '#/components/schemas/LinkStatus'
      responses:
        '200':
          description: Active or historical deceased links.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BurialLinkArraySuccessEnvelope'
  /responsibles:
    get:
      tags: [Responsibles]
      operationId: searchResponsibles
      x-roles: [ADMIN, EMPLOYEE]
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - in: query
          name: name
          schema: { type: string }
      responses:
        '200':
          description: Paginated responsibles with masked documents.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponsiblePageSuccessEnvelope'
    post:
      tags: [Responsibles]
      operationId: createResponsible
      x-roles: [ADMIN, EMPLOYEE]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResponsibleInput'
      responses:
        '201':
          description: Responsible created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponsibleDetailSuccessEnvelope'
        '422':
          $ref: '#/components/responses/ValidationError'
  /responsibles/search-sensitive:
    post:
      tags: [Responsibles]
      operationId: searchResponsiblesSensitive
      x-roles: [ADMIN, EMPLOYEE]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResponsibleSensitiveSearchInput'
      responses:
        '200':
          description: Exact document or phone matches returned as minimal list items without contacts.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponsiblePageSuccessEnvelope'
        '422':
          $ref: '#/components/responses/ValidationError'
  /responsibles/{id}:
    parameters:
      - $ref: '#/components/parameters/Id'
    get:
      tags: [Responsibles]
      operationId: getResponsible
      x-roles: [ADMIN, EMPLOYEE]
      responses:
        '200':
          description: Responsible detail with masked document and relationships.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponsibleDetailSuccessEnvelope'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      tags: [Responsibles]
      operationId: updateResponsible
      x-roles: [ADMIN, EMPLOYEE]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResponsibleInput'
      responses:
        '200':
          description: Responsible updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponsibleDetailSuccessEnvelope'
        '422':
          $ref: '#/components/responses/ValidationError'
  /responsibles/link:
    post:
      tags: [Responsibles]
      operationId: linkResponsible
      x-roles: [ADMIN, EMPLOYEE]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResponsibleLinkInput'
      responses:
        '201':
          description: Responsible relationship created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponsibleLinkSuccessEnvelope'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
  /responsible-links/{id}/end:
    parameters:
      - $ref: '#/components/parameters/Id'
    patch:
      tags: [Responsibles]
      operationId: endResponsibleLink
      x-roles: [ADMIN, EMPLOYEE]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EndLinkInput'
      responses:
        '200':
          description: Responsible relationship ended historically without physical deletion.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponsibleLinkSuccessEnvelope'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
  /burial-links:
    post:
      tags: [BurialLinks]
      operationId: createBurialLink
      x-roles: [ADMIN, EMPLOYEE]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateBurialLinkInput'
      responses:
        '201':
          description: Active burial link created and space status recalculated atomically.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BurialLinkSuccessEnvelope'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
  /burial-links/{id}/end:
    parameters:
      - $ref: '#/components/parameters/Id'
    patch:
      tags: [BurialLinks]
      operationId: endBurialLink
      x-roles: [ADMIN, EMPLOYEE]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EndLinkInput'
      responses:
        '200':
          description: Link ended historically and space status recalculated atomically.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BurialLinkSuccessEnvelope'
        '409':
          $ref: '#/components/responses/Conflict'
  /burial-links/by-space/{spaceId}:
    parameters:
      - in: path
        name: spaceId
        required: true
        schema: { type: string, format: uuid }
    get:
      tags: [BurialLinks]
      operationId: listBurialLinksBySpace
      x-roles: [ADMIN, EMPLOYEE]
      responses:
        '200':
          description: All active and ended links for a space.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BurialLinkArraySuccessEnvelope'
  /burial-links/by-deceased/{deceasedId}:
    parameters:
      - in: path
        name: deceasedId
        required: true
        schema: { type: string, format: uuid }
    get:
      tags: [BurialLinks]
      operationId: listBurialLinksByDeceased
      x-roles: [ADMIN, EMPLOYEE]
      responses:
        '200':
          description: All active and ended links for a deceased record.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BurialLinkArraySuccessEnvelope'
  /burial-links/validate-space/{spaceId}:
    parameters:
      - in: path
        name: spaceId
        required: true
        schema: { type: string, format: uuid }
    get:
      tags: [BurialLinks]
      operationId: validateSpaceCapacity
      x-roles: [ADMIN, EMPLOYEE]
      responses:
        '200':
          description: Advisory capacity result; create operation always revalidates transactionally.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SpaceAvailabilitySuccessEnvelope'
  /location-search:
    get:
      tags: [LocationSearch]
      operationId: searchLocations
      x-roles: [ADMIN, EMPLOYEE]
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - in: query
          name: deceasedName
          schema: { type: string }
        - in: query
          name: responsibleName
          schema: { type: string }
        - in: query
          name: deathDate
          schema: { type: string, format: date }
        - in: query
          name: burialDate
          schema: { type: string, format: date }
        - in: query
          name: sector
          schema: { type: string }
        - in: query
          name: burialSpaceIdentifier
          schema: { type: string }
      responses:
        '200':
          description: Paginated location results with masked documents.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LocationPageSuccessEnvelope'
  /location-search/by-document:
    post:
      tags: [LocationSearch]
      operationId: searchLocationsByDocument
      x-roles: [ADMIN, EMPLOYEE]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LocationDocumentSearchInput'
      responses:
        '200':
          description: Exact deceased or responsible document matches with masked output only.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LocationPageSuccessEnvelope'
        '422':
          $ref: '#/components/responses/ValidationError'
  /location-search/{deceasedId}:
    parameters:
      - in: path
        name: deceasedId
        required: true
        schema: { type: string, format: uuid }
    get:
      tags: [LocationSearch]
      operationId: getLocationDetail
      x-roles: [ADMIN, EMPLOYEE]
      responses:
        '200':
          description: Current location detail with minimum identifying data.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LocationItemSuccessEnvelope'
        '404':
          $ref: '#/components/responses/NotFound'
  /reports/deceased:
    get:
      tags: [Reports]
      operationId: deceasedReport
      x-roles: [ADMIN]
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/StartDate'
        - $ref: '#/components/parameters/EndDate'
      responses:
        '200':
          $ref: '#/components/responses/ReportResponse'
        '403':
          $ref: '#/components/responses/Forbidden'
  /reports/burials-by-period:
    get:
      tags: [Reports]
      operationId: burialsByPeriodReport
      x-roles: [ADMIN]
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/StartDate'
        - $ref: '#/components/parameters/EndDate'
      responses:
        '200':
          $ref: '#/components/responses/ReportResponse'
        '403':
          $ref: '#/components/responses/Forbidden'
  /reports/space-occupation:
    get:
      tags: [Reports]
      operationId: spaceOccupationReport
      x-roles: [ADMIN]
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/SpaceStatus'
        - $ref: '#/components/parameters/SpaceType'
        - $ref: '#/components/parameters/Sector'
      responses:
        '200':
          $ref: '#/components/responses/ReportResponse'
        '403':
          $ref: '#/components/responses/Forbidden'
  /reports/space-status:
    get:
      tags: [Reports]
      operationId: spaceStatusReport
      x-roles: [ADMIN]
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/SpaceStatus'
        - $ref: '#/components/parameters/SpaceType'
        - $ref: '#/components/parameters/Sector'
      responses:
        '200':
          $ref: '#/components/responses/ReportResponse'
        '403':
          $ref: '#/components/responses/Forbidden'
  /operations/health/live:
    get:
      tags: [Operations]
      operationId: liveness
      security: []
      x-infrastructure-only: true
      responses:
        '200':
          description: Process is alive; contains no dependency or personal detail.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthSuccessEnvelope'
  /operations/health/ready:
    get:
      tags: [Operations]
      operationId: readiness
      security:
        - metricsToken: []
      x-infrastructure-only: true
      responses:
        '200':
          description: Application and database are ready.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthSuccessEnvelope'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
  /operations/metrics:
    get:
      tags: [Operations]
      operationId: metrics
      security:
        - metricsToken: []
      x-infrastructure-only: true
      responses:
        '200':
          description: Optional and disableable metrics snapshot without personal labels.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MetricsSuccessEnvelope'
components:
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: jaziggo.session-token
    metricsToken:
      type: apiKey
      in: header
      name: X-Metrics-Token
  parameters:
    Id:
      in: path
      name: id
      required: true
      schema: { type: string, format: uuid }
    Page:
      in: query
      name: page
      schema: { type: integer, minimum: 1, default: 1 }
    PageSize:
      in: query
      name: pageSize
      schema: { type: integer, minimum: 1, maximum: 100, default: 25 }
    StartDate:
      in: query
      name: startDate
      schema: { type: string, format: date }
    EndDate:
      in: query
      name: endDate
      schema: { type: string, format: date }
    SpaceStatus:
      in: query
      name: status
      schema:
        $ref: '#/components/schemas/BurialSpaceStatus'
    SpaceType:
      in: query
      name: type
      schema:
        $ref: '#/components/schemas/BurialSpaceType'
    Sector:
      in: query
      name: sector
      schema: { type: string }
  responses:
    AuthSessionResponse:
      description: Authenticated active user; session set in HttpOnly cookie.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/UserSuccessEnvelope'
    Unauthorized:
      description: Missing, invalid or inactive session.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Forbidden:
      description: Authenticated role cannot perform the operation.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: Requested record does not exist.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Conflict:
      description: Duplicate, capacity, state or concurrency conflict.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    ValidationError:
      description: Invalid fields or violated input rule.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    ServiceUnavailable:
      description: A required internal dependency is unavailable.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    ReportResponse:
      description: Internal report view; data may be empty and documents remain masked.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ReportSuccessEnvelope'
  schemas:
    UserRole:
      type: string
      enum: [ADMIN, EMPLOYEE]
    UserStatus:
      type: string
      enum: [ACTIVE, INACTIVE]
    BurialSpaceType:
      type: string
      enum: [SEPULTURA, JAZIGO]
    BurialSpaceStatus:
      type: string
      enum: [AVAILABLE, OCCUPIED, RESERVED, INACTIVE]
    LinkStatus:
      type: string
      enum: [ACTIVE, ENDED]
    LoginInput:
      type: object
      additionalProperties: false
      required: [email, password]
      properties:
        email: { type: string, format: email }
        password: { type: string, minLength: 8 }
    ExactDocumentSearchInput:
      type: object
      additionalProperties: false
      required: [document]
      properties:
        document: { type: string, minLength: 1 }
        page: { type: integer, minimum: 1, default: 1 }
        pageSize: { type: integer, minimum: 1, maximum: 100, default: 25 }
    LocationDocumentSearchInput:
      type: object
      additionalProperties: false
      properties:
        deceasedDocument: { type: string, minLength: 1 }
        responsibleDocument: { type: string, minLength: 1 }
        page: { type: integer, minimum: 1, default: 1 }
        pageSize: { type: integer, minimum: 1, maximum: 100, default: 25 }
      oneOf:
        - required: [deceasedDocument]
        - required: [responsibleDocument]
    ResponsibleSensitiveSearchInput:
      type: object
      additionalProperties: false
      properties:
        document: { type: string, minLength: 1 }
        phone: { type: string, minLength: 1 }
        page: { type: integer, minimum: 1, default: 1 }
        pageSize: { type: integer, minimum: 1, maximum: 100, default: 25 }
      oneOf:
        - required: [document]
        - required: [phone]
    CreateUserInput:
      type: object
      additionalProperties: false
      required: [name, email, role]
      properties:
        name: { type: string, minLength: 1 }
        email: { type: string, format: email }
        role:
          $ref: '#/components/schemas/UserRole'
    UpdateUserInput:
      type: object
      additionalProperties: false
      properties:
        name: { type: string, minLength: 1 }
        email: { type: string, format: email }
        role:
          $ref: '#/components/schemas/UserRole'
    ChangePasswordInput:
      type: object
      additionalProperties: false
      required: [password, passwordConfirmation]
      properties:
        password: { type: string, minLength: 8, maxLength: 1024 }
        passwordConfirmation: { type: string, minLength: 8, maxLength: 1024 }
    UserResponse:
      type: object
      required: [id, name, email, role, status, mustChangePassword]
      properties:
        id: { type: string, format: uuid }
        name: { type: string, minLength: 1 }
        email: { type: string, format: email }
        role:
          $ref: '#/components/schemas/UserRole'
        status:
          $ref: '#/components/schemas/UserStatus'
        mustChangePassword: { type: boolean }
    UserPageResponse:
      allOf:
        - $ref: '#/components/schemas/PageMeta'
        - type: object
          required: [data]
          properties:
            data:
              type: array
              items:
                $ref: '#/components/schemas/UserResponse'
    CreateDeceasedInput:
      type: object
      additionalProperties: false
      required: [fullName]
      properties:
        fullName: { type: string, minLength: 1 }
        document: { type: string, minLength: 1 }
        birthDate: { type: string, format: date }
        deathDate: { type: string, format: date }
        burialDate: { type: string, format: date }
        datesUnknown: { type: boolean }
        notes: { type: string }
      anyOf:
        - required: [deathDate]
        - required: [burialDate]
        - required: [datesUnknown]
          properties:
            datesUnknown: { const: true }
    UpdateDeceasedInput:
      allOf:
        - $ref: '#/components/schemas/CreateDeceasedInput'
    DeceasedListItem:
      type: object
      required: [id, internalCode, fullName, historicalDataIncomplete]
      properties:
        id: { type: string, format: uuid }
        internalCode: { type: string, minLength: 1 }
        fullName: { type: string, minLength: 1 }
        documentMasked: { type: string, description: Only the final four characters may be visible. }
        deathDate: { type: string, format: date }
        burialDate: { type: string, format: date }
        historicalDataIncomplete: { type: boolean }
    DeceasedDetailResponse:
      allOf:
        - $ref: '#/components/schemas/DeceasedListItem'
        - type: object
          properties:
            birthDate: { type: string, format: date }
            datesUnknown: { type: boolean }
            notes: { type: string }
            links:
              type: array
              items:
                $ref: '#/components/schemas/BurialLinkResponse'
    DeceasedPageResponse:
      allOf:
        - $ref: '#/components/schemas/PageMeta'
        - type: object
          required: [data]
          properties:
            data:
              type: array
              items:
                $ref: '#/components/schemas/DeceasedListItem'
    CreateBurialSpaceInput:
      type: object
      additionalProperties: false
      required: [type, identifier, status, capacity]
      properties:
        type:
          $ref: '#/components/schemas/BurialSpaceType'
        identifier: { type: string, minLength: 1 }
        sector: { type: string, minLength: 1 }
        block: { type: string, minLength: 1 }
        street: { type: string, minLength: 1 }
        row: { type: string, minLength: 1 }
        number: { type: string, minLength: 1 }
        complement: { type: string, minLength: 1 }
        status: { type: string, enum: [AVAILABLE, RESERVED, INACTIVE] }
        capacity: { type: integer, minimum: 1 }
      allOf:
        - anyOf:
            - required: [sector]
            - required: [block]
            - required: [street]
            - required: [row]
            - required: [number]
            - required: [complement]
        - if:
            properties:
              type: { const: SEPULTURA }
          then:
            properties:
              capacity: { const: 1 }
    UpdateBurialSpaceInput:
      type: object
      additionalProperties: false
      required: [type, identifier, capacity]
      properties:
        type:
          $ref: '#/components/schemas/BurialSpaceType'
        identifier: { type: string, minLength: 1 }
        sector: { type: string, minLength: 1 }
        block: { type: string, minLength: 1 }
        street: { type: string, minLength: 1 }
        row: { type: string, minLength: 1 }
        number: { type: string, minLength: 1 }
        complement: { type: string, minLength: 1 }
        capacity: { type: integer, minimum: 1 }
      allOf:
        - anyOf:
            - required: [sector]
            - required: [block]
            - required: [street]
            - required: [row]
            - required: [number]
            - required: [complement]
        - if:
            properties:
              type: { const: SEPULTURA }
          then:
            properties:
              capacity: { const: 1 }
    BurialSpaceResponse:
      type: object
      required: [id, type, identifier, status, capacity, activeLinkCount]
      properties:
        id: { type: string, format: uuid }
        type:
          $ref: '#/components/schemas/BurialSpaceType'
        identifier: { type: string, minLength: 1 }
        sector: { type: string, minLength: 1 }
        block: { type: string, minLength: 1 }
        street: { type: string, minLength: 1 }
        row: { type: string, minLength: 1 }
        number: { type: string, minLength: 1 }
        complement: { type: string, minLength: 1 }
        status:
          $ref: '#/components/schemas/BurialSpaceStatus'
        capacity: { type: integer, minimum: 1 }
        activeLinkCount: { type: integer, minimum: 0 }
    BurialSpacePageResponse:
      allOf:
        - $ref: '#/components/schemas/PageMeta'
        - type: object
          required: [data]
          properties:
            data:
              type: array
              items:
                $ref: '#/components/schemas/BurialSpaceResponse'
    ResponsibleInput:
      type: object
      additionalProperties: false
      required: [fullName, documentType, document]
      properties:
        fullName: { type: string, minLength: 1 }
        documentType: { type: string, enum: [CPF, RG] }
        document: { type: string, minLength: 1 }
        phone: { type: string, minLength: 1 }
        email: { type: string, format: email }
        address: { type: string, minLength: 1 }
    ResponsibleListItem:
      type: object
      required: [id, fullName]
      properties:
        id: { type: string, format: uuid }
        fullName: { type: string, minLength: 1 }
        documentMasked: { type: string, description: Only the final four characters may be visible. }
    ResponsibleDetailResponse:
      allOf:
        - $ref: '#/components/schemas/ResponsibleListItem'
        - type: object
          properties:
            phone: { type: string, minLength: 1 }
            email: { type: string, format: email }
            address: { type: string, minLength: 1 }
            links:
              type: array
              items:
                $ref: '#/components/schemas/ResponsibleLinkResponse'
    ResponsiblePageResponse:
      allOf:
        - $ref: '#/components/schemas/PageMeta'
        - type: object
          required: [data]
          properties:
            data:
              type: array
              items:
                $ref: '#/components/schemas/ResponsibleListItem'
    ResponsibleLinkInput:
      type: object
      additionalProperties: false
      required: [responsibleId, linkType]
      properties:
        responsibleId: { type: string, format: uuid }
        linkType: { type: string, enum: [DECEASED, BURIAL_SPACE] }
        deceasedId: { type: string, format: uuid }
        burialSpaceId: { type: string, format: uuid }
      description: Exactly one target ID must be provided and match linkType.
    CreateBurialLinkInput:
      type: object
      additionalProperties: false
      required: [deceasedId, burialSpaceId]
      properties:
        deceasedId: { type: string, format: uuid }
        burialSpaceId: { type: string, format: uuid }
        responsibleId: { type: string, format: uuid }
        burialDate: { type: string, format: date }
    ResponsibleLinkResponse:
      type: object
      required: [id, responsibleId, linkType, status, createdAt]
      properties:
        id: { type: string, format: uuid }
        responsibleId: { type: string, format: uuid }
        linkType: { type: string, enum: [DECEASED, BURIAL_SPACE] }
        deceasedId: { type: string, format: uuid }
        burialSpaceId: { type: string, format: uuid }
        status:
          $ref: '#/components/schemas/LinkStatus'
        endedAt: { type: string, format: date-time }
        endReason: { type: string, minLength: 1 }
        createdAt: { type: string, format: date-time }
    EndLinkInput:
      type: object
      additionalProperties: false
      required: [endedAt, endReason, confirmation]
      properties:
        endedAt: { type: string, format: date-time }
        endReason: { type: string, minLength: 1 }
        confirmation: { type: boolean, const: true }
    BurialLinkResponse:
      type: object
      required: [id, deceasedId, burialSpaceId, status, createdAt]
      properties:
        id: { type: string, format: uuid }
        deceasedId: { type: string, format: uuid }
        burialSpaceId: { type: string, format: uuid }
        responsibleId: { type: string, format: uuid }
        burialDate: { type: string, format: date }
        status:
          $ref: '#/components/schemas/LinkStatus'
        endedAt: { type: string, format: date-time }
        endReason: { type: string, minLength: 1 }
        createdAt: { type: string, format: date-time }
    SpaceAvailabilityResponse:
      type: object
      required: [canLink, status, capacity, activeLinkCount]
      properties:
        canLink: { type: boolean }
        reasonCode: { type: string }
        status:
          $ref: '#/components/schemas/BurialSpaceStatus'
        capacity: { type: integer }
        activeLinkCount: { type: integer }
    LocationSearchItem:
      type: object
      required:
        - deceasedId
        - internalCode
        - deceasedName
        - historicalDataIncomplete
        - burialSpaceId
        - burialSpaceType
        - locationDescription
        - status
      properties:
        deceasedId: { type: string, format: uuid }
        internalCode: { type: string, minLength: 1 }
        deceasedName: { type: string, minLength: 1 }
        deceasedDocumentMasked: { type: string }
        deathDate: { type: string, format: date }
        burialDate: { type: string, format: date }
        historicalDataIncomplete: { type: boolean }
        responsibleName: { type: string }
        responsibleDocumentMasked: { type: string }
        burialSpaceId: { type: string, format: uuid }
        burialSpaceType:
          $ref: '#/components/schemas/BurialSpaceType'
        locationDescription: { type: string, minLength: 1 }
        status:
          $ref: '#/components/schemas/BurialSpaceStatus'
    LocationPageResponse:
      allOf:
        - $ref: '#/components/schemas/PageMeta'
        - type: object
          required: [data]
          properties:
            data:
              type: array
              items:
                $ref: '#/components/schemas/LocationSearchItem'
    ReportResponse:
      allOf:
        - $ref: '#/components/schemas/PageMeta'
        - type: object
          required: [title, generatedAt, filters, data]
          properties:
            title: { type: string, minLength: 1 }
            generatedAt: { type: string, format: date-time }
            filters: { type: object, additionalProperties: true }
            data:
              type: array
              items: { type: object, additionalProperties: true }
            emptyMessage: { type: string }
    PageMeta:
      type: object
      required: [page, pageSize, totalRecords, totalPages]
      properties:
        page: { type: integer, minimum: 1 }
        pageSize: { type: integer, minimum: 1, maximum: 100 }
        totalRecords: { type: integer, minimum: 0 }
        totalPages: { type: integer, minimum: 0 }
    SuccessEnvelopeBase:
      type: object
      required: [success, requestId]
      properties:
        success: { type: boolean, const: true }
        requestId: { type: string, minLength: 1 }
    UserSuccessEnvelope:
      allOf:
        - $ref: '#/components/schemas/SuccessEnvelopeBase'
        - type: object
          required: [data]
          properties:
            data: { $ref: '#/components/schemas/UserResponse' }
    UserPageSuccessEnvelope:
      allOf:
        - $ref: '#/components/schemas/SuccessEnvelopeBase'
        - type: object
          required: [data]
          properties:
            data: { $ref: '#/components/schemas/UserPageResponse' }
    DeceasedPageSuccessEnvelope:
      allOf:
        - $ref: '#/components/schemas/SuccessEnvelopeBase'
        - type: object
          required: [data]
          properties:
            data: { $ref: '#/components/schemas/DeceasedPageResponse' }
    DeceasedDetailSuccessEnvelope:
      allOf:
        - $ref: '#/components/schemas/SuccessEnvelopeBase'
        - type: object
          required: [data]
          properties:
            data: { $ref: '#/components/schemas/DeceasedDetailResponse' }
    BurialSpaceSuccessEnvelope:
      allOf:
        - $ref: '#/components/schemas/SuccessEnvelopeBase'
        - type: object
          required: [data]
          properties:
            data: { $ref: '#/components/schemas/BurialSpaceResponse' }
    BurialSpacePageSuccessEnvelope:
      allOf:
        - $ref: '#/components/schemas/SuccessEnvelopeBase'
        - type: object
          required: [data]
          properties:
            data: { $ref: '#/components/schemas/BurialSpacePageResponse' }
    ResponsiblePageSuccessEnvelope:
      allOf:
        - $ref: '#/components/schemas/SuccessEnvelopeBase'
        - type: object
          required: [data]
          properties:
            data: { $ref: '#/components/schemas/ResponsiblePageResponse' }
    ResponsibleDetailSuccessEnvelope:
      allOf:
        - $ref: '#/components/schemas/SuccessEnvelopeBase'
        - type: object
          required: [data]
          properties:
            data: { $ref: '#/components/schemas/ResponsibleDetailResponse' }
    ResponsibleLinkSuccessEnvelope:
      allOf:
        - $ref: '#/components/schemas/SuccessEnvelopeBase'
        - type: object
          required: [data]
          properties:
            data: { $ref: '#/components/schemas/ResponsibleLinkResponse' }
    BurialLinkSuccessEnvelope:
      allOf:
        - $ref: '#/components/schemas/SuccessEnvelopeBase'
        - type: object
          required: [data]
          properties:
            data: { $ref: '#/components/schemas/BurialLinkResponse' }
    BurialLinkArraySuccessEnvelope:
      allOf:
        - $ref: '#/components/schemas/SuccessEnvelopeBase'
        - type: object
          required: [data]
          properties:
            data:
              type: array
              items:
                $ref: '#/components/schemas/BurialLinkResponse'
    SpaceAvailabilitySuccessEnvelope:
      allOf:
        - $ref: '#/components/schemas/SuccessEnvelopeBase'
        - type: object
          required: [data]
          properties:
            data: { $ref: '#/components/schemas/SpaceAvailabilityResponse' }
    LocationPageSuccessEnvelope:
      allOf:
        - $ref: '#/components/schemas/SuccessEnvelopeBase'
        - type: object
          required: [data]
          properties:
            data: { $ref: '#/components/schemas/LocationPageResponse' }
    LocationItemSuccessEnvelope:
      allOf:
        - $ref: '#/components/schemas/SuccessEnvelopeBase'
        - type: object
          required: [data]
          properties:
            data: { $ref: '#/components/schemas/LocationSearchItem' }
    ReportSuccessEnvelope:
      allOf:
        - $ref: '#/components/schemas/SuccessEnvelopeBase'
        - type: object
          required: [data]
          properties:
            data: { $ref: '#/components/schemas/ReportResponse' }
    AcknowledgementSuccessEnvelope:
      allOf:
        - $ref: '#/components/schemas/SuccessEnvelopeBase'
        - type: object
          required: [data]
          properties:
            data:
              type: object
              required: [acknowledged]
              properties:
                acknowledged: { type: boolean, const: true }
    HealthSuccessEnvelope:
      allOf:
        - $ref: '#/components/schemas/SuccessEnvelopeBase'
        - type: object
          required: [data]
          properties:
            data:
              type: object
              required: [status]
              properties:
                status: { type: string, enum: [ok, ready] }
    MetricsSuccessEnvelope:
      allOf:
        - $ref: '#/components/schemas/SuccessEnvelopeBase'
        - type: object
          required: [data]
          properties:
            data:
              type: object
              required: [format, content]
              properties:
                format: { type: string, const: prometheus }
                content: { type: string, minLength: 1 }
    ErrorResponse:
      type: object
      required: [success, error, requestId]
      properties:
        success: { type: boolean, const: false }
        error:
          type: object
          required: [code, message]
          properties:
            code: { type: string, minLength: 1 }
            message: { type: string, minLength: 1 }
            fieldErrors:
              type: object
              additionalProperties:
                type: array
                items: { type: string }
        requestId: { type: string, minLength: 1 }
